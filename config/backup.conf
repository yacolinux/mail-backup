# =============================================================================
# Zimbra Backup System - Configuración Central
# =============================================================================
# Todas las rutas son relativas al contenedor Docker.
# Editar este archivo para ajustar el comportamiento del sistema.

[general]
# Directorio base donde se almacenan los backups locales
backup_dir = /data/backups

# Ruta de la base de datos SQLite
db_path = /data/db/backup.db

# Archivo de log
log_path = /data/logs/backup.log

# Nivel de log: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Intervalo entre backups en horas
backup_interval_hours = 2

# Zona horaria para el scheduler (usa nombres de pytz, ej: America/Argentina/Buenos_Aires)
timezone = UTC

# Clave API para proteger el endpoint REST interno (genera una aleatoria)
api_key = CHANGE_ME_USE_openssl_rand_hex_32


[source]
# Ruta base donde están los maildirs EN EL SERVIDOR ZIMBRA REMOTO.
# Esta ruta se interpreta en el servidor remoto cuando zimbra_remote.enabled = true.
# Estructura esperada: <maildir_base>/<dominio>/<usuario>/Maildir/
#
# Ejemplos comunes:
#   - Zimbra estándar: /opt/zimbra/store
#   - Zimbra con symlink: /zimbra/store
#   - Dovecot/Postfix: /var/mail/vhosts
maildir_base = /opt/zimbra/store

# Método para descubrir cuentas:
#   - zmprov: usa 'zmprov -l gaa' en el servidor Zimbra (recomendado)
#   - scan: escanea directorios via SSH find (alternativa si no hay zmprov)
account_discovery = zmprov

# Ruta al binario zmprov en el servidor Zimbra
zimbra_bin = /opt/zimbra/bin/zmprov

# Cuentas a EXCLUIR del backup (separadas por coma)
exclude_accounts =

# Dominios a incluir (vacío = todos los dominios encontrados)
include_domains =


[zimbra_remote]
# =============================================================================
# MODO REMOTO (RECOMENDADO PARA PRODUCCIÓN)
# =============================================================================
# El backup-service se ejecuta en el SERVIDOR DE BACKUP (NO en el mailserver).
# Se conecta via SSH al servidor Zimbra para extraer los mailboxes via rsync.
#
# Configuración:
# 1. enabled = true
# 2. host = servidor Zimbra donde están los mailboxes
# 3. user = usuario SSH en el servidor Zimbra
# 4. ssh_key = /config/ssh/id_rsa (generar con scripts/setup-ssh-key.sh)
# 5. Copiar la clave pública al servidor Zimbra:
#    ssh-copy-id -i config/ssh/id_rsa.pub user@host
# =============================================================================

# Activar modo backup remoto (RECOMENDADO: true para producción)
enabled = true

# Host del servidor Zimbra (donde están los mailboxes)
host = zimbra.example.com

# Usuario SSH en el servidor Zimbra
# Debe tener acceso de lectura al maildir_base y poder ejecutar zmprov
user = zimbrabackup

# Clave SSH privada para conectar al servidor Zimbra (montar como volumen)
ssh_key = /config/ssh/id_rsa

# Puerto SSH del servidor Zimbra
ssh_port = 22


[remote]
# =============================================================================
# BACKUP SECUNDARIO OFFSITE (OPCIONAL)
# =============================================================================
# Copia el directorio de backups a otro servidor para redundancia adicional.
# Esto es SECUNDARIO - el flujo principal es: Zimbra → Servidor Backup
# Este [remote] es: Servidor Backup → Servidor Offsite (terciario)
# =============================================================================
enabled = false

# Host remoto
host = backup-offsite.example.com

# Usuario SSH en el host remoto
user = backupuser

# Ruta base en el servidor remoto
path = /backups/zimbra

# Clave SSH privada para rsync (montar como volumen)
ssh_key = /config/ssh/id_rsa

# Puerto SSH
ssh_port = 22

# Opciones adicionales de rsync (--compress recomendado para WAN)
rsync_options = --compress --checksum


[retention]
# ============================================================
# Política de retención tipo GFS (Grandfather-Father-Son)
# ============================================================
# Los valores definen CUÁNTOS snapshots de cada tipo conservar.
# El sistema aplica la política en cascada:
#   - Backups recientes: mantiene UNO por período (cada 2hs)
#   - Pasado el período horario: mantiene UNO por DÍA
#   - Pasado el período diario: mantiene UNO por SEMANA
#   - Pasado el período semanal: mantiene UNO por MES
#
# Ejemplo configuración 10 años:
#   hourly_keep  = 48    → 4 días de backups cada 2 horas
#   daily_keep   = 30    → 30 días con 1 backup por día
#   weekly_keep  = 52    → 52 semanas (1 año) con 1 backup por semana
#   monthly_keep = 120   → 120 meses (10 años) con 1 backup por mes

# Cantidad de snapshots horarios a conservar (def: 48 = 4 días)
hourly_keep = 48

# Cantidad de snapshots diarios a conservar (def: 30 = 1 mes)
daily_keep = 30

# Cantidad de snapshots semanales a conservar (def: 52 = 1 año)
weekly_keep = 52

# Cantidad de snapshots mensuales a conservar (def: 120 = 10 años)
monthly_keep = 120


[git]
# Habilitar versionado de metadatos del backup con git
enabled = true

# Ruta del repositorio git (para tracking de manifiestos/metadatos)
repo_path = /data/git

# Remote git opcional (para push de metadatos - usar SSH o HTTPS con token)
# Ejemplo: git@github.com:miorg/zimbra-backup-meta.git
git_remote =

# Identidad de git para los commits
git_user_name = Zimbra Backup System
git_user_email = backup@localhost
