[general]
backup_dir = /data/backups
db_path = /data/db/backup.db
log_path = /data/logs/backup.log
log_level = DEBUG
backup_interval_hours = 2
timezone = UTC
api_key = dev_api_key_1234567890abcdef

[source]
maildir_base = /zimbra/store
account_discovery = scan
zimbra_bin = /opt/zimbra/bin/zmprov
exclude_accounts = 
include_domains = 

[zimbra_remote]
enabled = false
host = localhost
user = devuser
ssh_key = /config/ssh/id_rsa
ssh_port = 22

[remote]
enabled = false
host = localhost
user = devuser
path = /backups
ssh_key = /config/ssh/id_rsa
ssh_port = 22
rsync_options = --compress

[retention]
hourly_keep = 48
daily_keep = 30
weekly_keep = 52
monthly_keep = 120

[git]
enabled = true
repo_path = /data/git
git_remote = 
git_user_name = Zimbra Backup Dev
git_user_email = dev@localhost

