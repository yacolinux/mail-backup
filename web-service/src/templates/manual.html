{% extends "base.html" %}
{% block title %}Manual de Usuario{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
    <i class="bi bi-book fs-4 text-success"></i>
    <div>
        <h5 class="mb-0 fw-bold">Manual de Usuario</h5>
        <p class="text-muted small mb-0">Guía completa del sistema de backup</p>
    </div>
    <div class="ms-auto d-flex gap-2">
        <a href="{{ url_for('manual_download_pdf') }}" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-file-pdf me-1"></i> Descargar PDF
        </a>
        <a href="{{ url_for('manual_download_md') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-file-text me-1"></i> Descargar .md
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <iframe src="{{ url_for('manual_pdf_view') }}" style="width:100%; height:75vh; border:none;" title="Manual de Usuario"></iframe>
    </div>
</div>
{% endblock %}
